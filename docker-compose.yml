services:
  api:
    build: .
    container_name: mineprofiles-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/mineprofiles
      MOJANG_API_BASE_URL: https://api.mojang.com
      MOJANG_SESSION_BASE_URL: https://sessionserver.mojang.com
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mineprofiles-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
